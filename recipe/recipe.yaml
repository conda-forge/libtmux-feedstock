schema_version: 1

context:
  name: libtmux
  version: "0.60.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 03d9740fd18090378a1f1a763403b127808b327b1466a1d3812c562f595ce06f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - tmux
    - __unix

tests:
  - python:
      imports:
        - libtmux
        - libtmux.session
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python API / wrapper for tmux
  description: |
    libtmux is a typed Python library that provides a wrapper for interacting programmatically
    with tmux, a terminal multiplexer. You can use it to manage tmux servers, sessions, windows,
    and panes.
    Additionally, libtmux powers tmuxp, a tmux workspace manager.
  license: MIT
  license_file: LICENSE
  homepage: https://libtmux.git-pull.com/
  repository: https://github.com/tmux-python/libtmux
  documentation: https://libtmux.git-pull.com/

extra:
  recipe-maintainers:
    - AntoinePrv
    - tony
